# Vértice — stack de DESENVOLVIMENTO local.
#
# Para subir em DEV:
#     docker compose -f docker-compose.dev.yml up
#
# Diferenças vs `docker-compose.yml` (produção):
#   - SEM Caddy (sem TLS, sem domínio): app exposta direto em 8000.
#   - Postgres exposto em 5432 do host para você conectar via DBeaver/psql.
#   - Volume bind-mount `./app:/app/app` para hot-reload do uvicorn.
#   - Mock de LLM padrão (sem chaves).
#
# DESIGN: este compose é AUTOCONTIDO — DATABASE_URL, POSTGRES_USER/DB/PASSWORD
# e APP_SECRET_KEY são fixos aqui dentro porque apontam para o serviço
# `postgres` criado neste mesmo compose. O Docker Compose carrega `.env` da
# raiz automaticamente (para variable substitution); se você tem um `.env`
# de outro ambiente apontando para um Postgres externo, esses valores
# vazariam pelo `${VAR:-default}` e o container tentaria conectar no
# Postgres errado. Por isso evitamos a indireção aqui. Para customizar
# portas locais (conflito com outro serviço), use as duas únicas vars
# externas: APP_HOST_PORT e POSTGRES_HOST_PORT.

services:
  postgres:
    image: postgres:16-alpine
    container_name: vertice-postgres-dev
    environment:
      # Credenciais FIXAS para o Postgres interno do compose dev.
      POSTGRES_USER: vertice
      POSTGRES_PASSWORD: vertice
      POSTGRES_DB: vertice
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "random_page_cost=1.1"
    ports:
      # APP_HOST_PORT só ajusta a porta exposta no host se 5432 já estiver
      # em uso (ex.: você roda um Postgres nativo na máquina). O container
      # mesmo sempre escuta em 5432 internamente.
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - vertice_pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vertice -d vertice"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  vertice:
    build: .
    container_name: vertice-dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # FIXO: aponta para o serviço `postgres` deste compose.
      DATABASE_URL: postgresql://vertice:vertice@postgres:5432/vertice
      APP_SECRET_KEY: dev-only-not-a-secret-change-in-prod
      APP_ENV: development
      PG_POOL_MIN_SIZE: "5"
      PG_POOL_MAX_SIZE: "20"
      # Reload do uvicorn já cobre hot-reload — 1 worker é suficiente em dev.
      UVICORN_WORKERS: "1"
      # LLMs — opt-in via `.env` da raiz (Compose carrega automaticamente).
      # Sem a var no .env, `${VAR:-}` injeta string vazia → adapter cai em modo
      # mock. Espelha o bloco do docker-compose.yml (prod) para que o dev se
      # comporte igual quando você preenche chaves.
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-08-01-preview}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4o}
      MARITACA_API_KEY: ${MARITACA_API_KEY:-}
      MARITACA_MODEL: ${MARITACA_MODEL:-sabia-4}
      MARITACA_BASE_URL: ${MARITACA_BASE_URL:-https://chat.maritaca.ai/api}
      GAIA_API_KEY: ${GAIA_API_KEY:-}
      GAIA_MODEL: ${GAIA_MODEL:-gaia-4b}
      GAIA_BASE_URL: ${GAIA_BASE_URL:-}
    ports:
      - "${APP_HOST_PORT:-8000}:8000"
    volumes:
      # Bind-mount do código pra hot-reload. Skills moram em /app/app/skills,
      # então qualquer arquivo criado via UI também aparece no repo local
      # (útil em dev, diferente do prod que usa volume nomeado).
      - ./app:/app/app
    restart: unless-stopped
    # --reload sobrescreve o entrypoint padrão (uvicorn --workers N). O seed
    # de skills do entrypoint não precisa rodar aqui porque o bind-mount já
    # traz os skills do repo.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  vertice_pgdata_dev:
