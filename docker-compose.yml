# Vértice — stack de PRODUÇÃO (default).
#
# Este é o `docker-compose.yml` padrão — usado pelo Hostinger Docker
# Manager (e por qualquer plataforma que invoca `docker compose up` sem
# argumentos). Para desenvolvimento local, use `docker-compose.dev.yml`:
#
#     docker compose -f docker-compose.dev.yml up
#
# Serviços:
#   caddy     → reverse proxy + TLS automático (Let's Encrypt). Portas
#               publicadas: 80 (ACME challenge + redirect) e
#               PUBLIC_HTTPS_PORT (default 8010, HTTPS público).
#   vertice   → FastAPI/uvicorn (porta 8000 SOMENTE interna à rede).
#   postgres  → banco (porta 5432 SOMENTE interna; volume persistente).
#   pgbackup  → cron diário com pg_dump → /var/backups/postgres.
#
# Segurança operacional:
#   - Apenas 80 e PUBLIC_HTTPS_PORT abertas publicamente; resto fica em
#     network bridge interna. Postgres NÃO é exposto.
#   - App e Postgres rodam como usuários não-root.
#   - Healthchecks em todos os serviços; depends_on aguarda saudável.
#   - Restart policy: unless-stopped.
#   - Logs com json-file driver e rotação (10MB × 5 arquivos).
#   - Resource limits configuráveis via .env (.env.production).
#
# Subir (Hostinger Docker Manager faz automaticamente):
#   docker compose --env-file .env.production up -d --build
# Atualizar:
#   git pull && docker compose --env-file .env.production up -d --build
# Logs ao vivo:
#   docker compose logs -f vertice caddy

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:

  # ----------------------------------------------------------------- Caddy
  caddy:
    image: caddy:2-alpine
    container_name: vertice-caddy
    restart: unless-stopped
    ports:
      # HTTP — usado APENAS pelo ACME HTTP-01 challenge do Let's Encrypt
      # e para redirecionar para https://DOMAIN:${PUBLIC_HTTPS_PORT}.
      # Se o ACME challenge não conseguir bater na porta 80, o cert não
      # é emitido. Mantenha-a aberta no firewall.
      - "${PUBLIC_HTTP_PORT:-80}:80"
      # HTTPS público em 8010 (configurável via env). Caddy escuta direto
      # na 8010 internamente (não 443), pra que redirecionamentos e auto-
      # links saiam corretamente com :8010 na URL.
      - "${PUBLIC_HTTPS_PORT:-8010}:${PUBLIC_HTTPS_PORT:-8010}"
      - "${PUBLIC_HTTPS_PORT:-8010}:${PUBLIC_HTTPS_PORT:-8010}/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # certs Let's Encrypt persistem aqui
      - caddy_config:/config
    environment:
      # DOMAIN e ACME_EMAIL são OPCIONAIS no compose-time. Se não forem
      # passados (ex.: primeiro deploy no Hostinger antes de configurar
      # env vars no painel), Caddy serve em :PUBLIC_HTTPS_PORT com cert
      # self-signed (CA interna do Caddy). Quando você preencher DOMAIN
      # e ACME_EMAIL, Caddy automaticamente passa a usar Let's Encrypt.
      DOMAIN: ${DOMAIN:-}
      ACME_EMAIL: ${ACME_EMAIL:-internal}
      PUBLIC_HTTPS_PORT: ${PUBLIC_HTTPS_PORT:-8010}
    networks: [edge, internal]
    depends_on:
      vertice:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging

  # ----------------------------------------------------------------- App
  vertice:
    build:
      context: .
      dockerfile: Dockerfile
    image: vertice:${VERTICE_TAG:-latest}
    container_name: vertice-app
    restart: unless-stopped
    # SEM publicar portas — só Caddy fala com este serviço.
    expose:
      - "8000"
    environment:
      # Banco
      DATABASE_URL: ${DATABASE_URL:-postgresql://vertice:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vertice}}
      PG_POOL_MIN_SIZE: ${PG_POOL_MIN_SIZE:-5}
      PG_POOL_MAX_SIZE: ${PG_POOL_MAX_SIZE:-20}
      PG_POOL_MAX_INACTIVE_CONNECTION_LIFETIME: ${PG_POOL_MAX_INACTIVE_CONNECTION_LIFETIME:-300.0}
      PG_COMMAND_TIMEOUT: ${PG_COMMAND_TIMEOUT:-30.0}
      PG_STATEMENT_CACHE_SIZE: ${PG_STATEMENT_CACHE_SIZE:-1024}
      # App
      APP_NAME: ${APP_NAME:-Vértice}
      APP_ENV: ${APP_ENV:-production}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      # APP_SECRET_KEY é o ÚNICO secret cuja ausência é catastrófica
      # (assinatura JWT/cookies). Mantido obrigatório.
      APP_SECRET_KEY: ${APP_SECRET_KEY:?APP_SECRET_KEY não definido — gere com openssl rand -hex 32}
      # APP_BASE_URL é derivado de DOMAIN se não setado explicitamente.
      # Se DOMAIN estiver vazio, fica vazio e o app trata como base URL
      # relativa.
      APP_BASE_URL: ${APP_BASE_URL:-}
      # Auth
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-480}
      ADMIN_BOOTSTRAP_USER: ${ADMIN_BOOTSTRAP_USER:-admin}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:?ADMIN_BOOTSTRAP_PASSWORD não definido — defina no painel do Hostinger}
      # LLMs (opt-in; sem chave → modo mock automático)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1}
      MARITACA_API_KEY: ${MARITACA_API_KEY:-}
      MARITACA_MODEL: ${MARITACA_MODEL:-sabia-4}
      MARITACA_BASE_URL: ${MARITACA_BASE_URL:-https://chat.maritaca.ai/api}
      GAIA_API_KEY: ${GAIA_API_KEY:-}
      GAIA_MODEL: ${GAIA_MODEL:-gaia-4b}
      GAIA_BASE_URL: ${GAIA_BASE_URL:-}
      # Router
      ROUTER_DEFAULT_MODEL: ${ROUTER_DEFAULT_MODEL:-sabia-4}
      ROUTER_FALLBACK_MODEL: ${ROUTER_FALLBACK_MODEL:-gpt-4.1}
      ROUTER_CHEAP_MODEL: ${ROUTER_CHEAP_MODEL:-gaia-4b}
      # Observability
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-vertice}
      # Política
      OPA_URL: ${OPA_URL:-}
      # Guardrails
      GUARDRAIL_INPUT_MAX_CHARS: ${GUARDRAIL_INPUT_MAX_CHARS:-20000}
      GUARDRAIL_INJECTION_BLOCK: ${GUARDRAIL_INJECTION_BLOCK:-true}
      GUARDRAIL_PII_REDACT: ${GUARDRAIL_PII_REDACT:-true}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]
    deploy:
      resources:
        limits:
          # Padrão para VPS ~2-4GB RAM. Aumentar se LLMs/pandas estouram.
          memory: ${VERTICE_MEM_LIMIT:-1g}
          cpus: ${VERTICE_CPU_LIMIT:-1.5}
        reservations:
          memory: ${VERTICE_MEM_RESERVE:-256m}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  # ----------------------------------------------------------------- Postgres
  postgres:
    image: postgres:16-alpine
    container_name: vertice-postgres
    restart: unless-stopped
    # SEM publicar 5432 — apenas a network interna acessa.
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vertice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD não definido — defina no painel do Hostinger}
      POSTGRES_DB: ${POSTGRES_DB:-vertice}
      POSTGRES_INITDB_ARGS: "--data-checksums"
      # Tuning seguro para VPS small (16 ainda usa shared_buffers conservador
      # por padrão). Ajustar conforme RAM disponível.
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - "postgres"
      - "-c"
      - "max_connections=${PG_MAX_CONNECTIONS:-200}"
      - "-c"
      - "shared_buffers=${PG_SHARED_BUFFERS:-256MB}"
      - "-c"
      - "effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-1GB}"
      - "-c"
      - "work_mem=${PG_WORK_MEM:-8MB}"
      - "-c"
      - "maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-64MB}"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_size=${PG_MAX_WAL_SIZE:-2GB}"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "log_min_duration_statement=${PG_LOG_MIN_DURATION_MS:-1000}"
      - "-c"
      - "log_lock_waits=on"
      - "-c"
      - "track_io_timing=on"
    volumes:
      - vertice_pgdata:/var/lib/postgresql/data
    networks: [internal]
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEM_LIMIT:-1g}
          cpus: ${POSTGRES_CPU_LIMIT:-1.0}
        reservations:
          memory: ${POSTGRES_MEM_RESERVE:-256m}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vertice} -d ${POSTGRES_DB:-vertice}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    logging: *default-logging

  # ----------------------------------------------------------------- Backup
  # Container utilitário: roda 24h em loop, dispara pg_dump no horário
  # configurado, mantém os últimos N dias e rota arquivos antigos.
  pgbackup:
    image: postgres:16-alpine
    container_name: vertice-pgbackup
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER:-vertice}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD não definido — defina no painel do Hostinger}
      PGDATABASE: ${POSTGRES_DB:-vertice}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_AT_HOUR_UTC: ${BACKUP_AT_HOUR_UTC:-3}     # 03:00 UTC = 00:00 BRT
    volumes:
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
      - vertice_backups:/var/backups/postgres
    entrypoint: ["/bin/sh", "/usr/local/bin/backup.sh"]
    networks: [internal]
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging

networks:
  edge:
    driver: bridge
  internal:
    driver: bridge
    internal: false   # precisa de outbound (Let's Encrypt, LLMs)

volumes:
  vertice_pgdata:
    name: vertice_pgdata
  vertice_backups:
    name: vertice_backups
  caddy_data:
    name: vertice_caddy_data
  caddy_config:
    name: vertice_caddy_config
