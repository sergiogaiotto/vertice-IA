<footer x-data="costPulse()" x-init="load(); setInterval(() => load(), 30000)"
        class="fixed bottom-0 inset-x-0 h-9 bg-white border-t border-neutral-100 flex items-center gap-3 px-4 text-[11px] text-neutral-500 z-20 shadow-xs">
  <span class="flex items-center gap-1.5">
    <span class="dot dot-success pulse-soft"></span>
    <span class="font-medium text-neutral-600">OPA</span>
    <span class="text-neutral-300">·</span>
    <span class="font-medium text-neutral-600">LangFuse</span>
    <span class="text-neutral-300">·</span>
    <span class="font-medium text-neutral-600">OTel</span>
  </span>
  <span class="divider-v h-4"></span>
  <span class="text-mono text-neutral-400">v1.0.0</span>

  <div class="flex-1"></div>

  <!-- Top 3 módulos por custo (proporção visual) -->
  <template x-if="data && data.by_module && data.by_module.length > 0">
    <div class="flex items-center gap-3">
      <template x-for="row in topModules()" :key="row.key">
        <span class="flex items-center gap-1" :title="`${row.key} · ${row.calls} calls · ${row.tokens_input + row.tokens_output} tok`">
          <span class="w-1.5 h-1.5 rounded-full" :style="`background:${colorFor(row.key)}`"></span>
          <span class="font-mono text-neutral-600" x-text="row.key"></span>
          <span class="text-neutral-400" x-text="`US$ ${row.cost.toFixed(5)}`"></span>
        </span>
      </template>
    </div>
  </template>

  <span x-show="data && data.by_module && data.by_module.length > 0">·</span>

  <span>Custo total</span>
  <div class="flex items-center gap-2">
    <!-- Mini barra proporcional -->
    <div class="w-20 h-1 bg-neutral-100 rounded-full overflow-hidden flex" x-show="data">
      <template x-for="seg in segments()" :key="seg.key">
        <div :style="`width:${seg.pct}%;background:${seg.color}`"></div>
      </template>
    </div>
    <span class="font-medium text-neutral-700" x-text="data ? `US$ ${(data.total_cost || 0).toFixed(5)}` : 'US$ 0,00000'"></span>
    <span x-show="data" class="text-neutral-400" x-text="data ? `· ${data.total_calls} calls` : ''"></span>
  </div>
</footer>

<script>
function costPulse() {
  const palette = ['#DC2626', '#534AB7', '#185FA5', '#993C1D', '#993556', '#854F0B', '#3B6D11'];
  return {
    data: null,

    async load() {
      try {
        this.data = await window.api('GET', '/api/finops/summary');
      } catch (e) { /* silencioso — barra fica em branco */ }
    },

    colorFor(key) {
      const seed = Array.from(String(key)).reduce((a, c) => a + c.charCodeAt(0), 0);
      return palette[seed % palette.length];
    },

    topModules() {
      if (!this.data || !this.data.by_module) return [];
      return [...this.data.by_module]
        .sort((a, b) => b.cost - a.cost)
        .slice(0, 3);
    },

    segments() {
      if (!this.data || !this.data.by_module || this.data.total_cost === 0) return [];
      const total = this.data.total_cost || 1;
      return this.data.by_module
        .filter(r => r.cost > 0)
        .map(r => ({
          key: r.key,
          pct: Math.max(2, Math.round((r.cost / total) * 100)),
          color: this.colorFor(r.key),
        }));
    },
  };
}
</script>
