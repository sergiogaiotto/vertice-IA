<header class="topbar sticky top-0 z-30 shadow-xs">
  <a href="/" class="flex items-center gap-2 mr-4 hover:opacity-90">
    <span class="w-7 h-7 rounded bg-brand-600 flex items-center justify-center shadow-xs">
      <svg width="14" height="14" viewBox="0 0 12 12"><path d="M2 2 L6 10 L10 2" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </span>
    <span class="font-medium tracking-tight text-[15px] text-neutral-900">Vértice</span>
  </a>

  <span class="text-neutral-200 select-none">/</span>
  <span class="text-[13px] text-neutral-600 capitalize">{{ active_module or 'início' }}</span>

  <div class="flex-1"></div>

  <button onclick="window.dispatchEvent(new CustomEvent('open-palette'))"
          class="hidden md:flex items-center gap-2 px-3 h-8 bg-neutral-50 hover:bg-neutral-100 transition rounded-md text-[12px] text-neutral-500 w-72 border border-neutral-100">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="5" cy="5" r="3.5" stroke="currentColor" stroke-width="1.2"/><path d="M7.5 7.5 L10 10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
    <span class="flex-1 text-left">Pergunte, busque, comande…</span>
    <kbd class="px-1.5 py-0.5 bg-white rounded border border-neutral-100 text-[10px] text-neutral-400">⌘K</kbd>
  </button>

  <div class="flex-1"></div>

  <a href="/api/docs" class="text-[11px] text-neutral-500 hover:text-neutral-800 uppercase tracking-wider font-medium">API</a>
  <span class="divider-v h-5"></span>
  <a href="/logout" class="text-[11px] text-neutral-500 hover:text-neutral-800 uppercase tracking-wider font-medium">sair</a>

  <div class="flex items-center gap-2 ml-2 pl-3 border-l border-neutral-100">
    <div class="text-right hidden sm:block">
      <div class="text-[11px] text-neutral-700 font-medium leading-tight">{{ user.username }}</div>
      <div class="text-[9.5px] text-neutral-400 leading-tight">{{ user.roles | join(' · ') if user.roles else 'sem papéis' }}</div>
    </div>
    <div class="w-8 h-8 rounded-full bg-ai-600 text-white text-[11px] font-medium flex items-center justify-center shadow-xs" title="{{ user.username }}">
      {{ user.username[:2]|upper }}
    </div>
  </div>
</header>
