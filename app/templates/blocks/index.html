{% extends "base.html" %}
{% block title %}Inventário — Vértice{% endblock %}

{% block content %}
<div x-data="blocksApp()" class="px-6 py-5 pb-12 max-w-full">

  <div class="flex items-center justify-between mb-5">
    <div>
      <h1 class="text-lg font-medium">Inventário</h1>
      <p class="text-xs text-neutral-500">Catálogo consolidado de blocos disponíveis — cada bloco agrega módulo + skill + prompts.</p>
    </div>

    <div class="flex items-center gap-2">
      <input x-model="filter" type="text" placeholder="buscar bloco…"
             class="h-9 px-3 w-64 border border-neutral-200 rounded-md text-sm focus:border-brand-600 outline-none" />
      <select x-model="statusFilter" class="h-9 px-2 border border-neutral-200 rounded-md text-sm bg-white">
        <option value="">todos status</option>
        <option value="active">ativo</option>
        <option value="paused">pausado</option>
        <option value="deprecated">deprecado</option>
      </select>
      <a href="/modules" class="text-xs h-9 px-3 bg-brand-600 hover:bg-brand-800 text-white rounded-md font-medium flex items-center gap-1.5">
        gerenciar →
      </a>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    <template x-for="b in filtered()" :key="b.id">
      <div class="bg-white border border-neutral-200 rounded-xl overflow-hidden hover:shadow-md transition group cursor-pointer"
           @click="openBlock(b)">

        <!-- Cover gradiente determinístico baseado no nome -->
        <div class="h-24 relative" :style="coverStyle(b.name)">
          <div class="absolute inset-0 flex items-end p-3">
            <div class="w-10 h-10 rounded-lg bg-white/95 flex items-center justify-center text-base font-medium" :style="`color:${coverColor(b.name)}`">
              <span x-text="b.title.substring(0,1).toUpperCase()"></span>
            </div>
          </div>
          <div class="absolute top-2 right-2">
            <span class="text-[10px] px-1.5 py-0.5 rounded backdrop-blur-sm"
                  :class="b.status === 'active' ? 'bg-brand-50/95 text-brand-800' : (b.status === 'paused' ? 'bg-amber-50/95 text-amber-800' : 'bg-neutral-100/95 text-neutral-500')"
                  x-text="b.status"></span>
          </div>
        </div>

        <div class="p-4">
          <div class="flex items-center justify-between mb-1">
            <h3 class="text-sm font-medium" x-text="b.title"></h3>
          </div>
          <p class="text-xs text-neutral-500 leading-relaxed line-clamp-2 mb-3" x-text="b.description"></p>

          <div class="flex items-center gap-3 text-[10px] text-neutral-400">
            <span class="flex items-center gap-1" :class="b.skill_obj && 'text-ai-600'">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M5 4 H19 V20 H5 Z" stroke="currentColor" stroke-width="2"/></svg>
              <span x-text="b.skill_obj ? b.skill_obj.name : 'sem skill'"></span>
            </span>
            <span>·</span>
            <span x-text="`${b.prompts_count} prompt${b.prompts_count === 1 ? '' : 's'}`"></span>
            <span>·</span>
            <span x-text="`${Object.keys(b.config_params || {}).length} param${Object.keys(b.config_params || {}).length === 1 ? '' : 's'}`"></span>
          </div>
        </div>

        <!-- Hover footer com health -->
        <div class="px-4 pb-3 -mt-1 opacity-0 group-hover:opacity-100 transition">
          <button @click.stop="checkHealth(b)" class="text-[11px] text-neutral-500 hover:text-brand-600">verificar saúde →</button>
          <span x-show="health[b.id]" class="text-[10px] ml-2"
                :class="health[b.id] && health[b.id].ok ? 'text-brand-600' : 'text-risk-600'">
            <span x-text="health[b.id] && (health[b.id].ok ? '✓ ' + health[b.id].latency_ms + 'ms' : '✗ ' + (health[b.id].error || 'falha'))"></span>
          </span>
        </div>
      </div>
    </template>
  </div>

  <div x-show="filtered().length === 0" class="text-center py-16 text-sm text-neutral-400">
    Nenhum bloco corresponde aos filtros.
  </div>

  <!-- Drawer de detalhes do bloco -->
  <div x-show="selected" x-cloak class="fixed inset-0 z-40 flex">
    <div @click="selected = null" class="flex-1 bg-black/30"></div>
    <div class="w-[480px] max-w-[92vw] bg-white shadow-2xl overflow-y-auto" x-show="selected" x-transition.opacity>
      <template x-if="selected">
        <div>
          <div class="h-32 relative" :style="coverStyle(selected.name)">
            <button @click="selected = null" class="absolute top-3 right-3 w-7 h-7 rounded-full bg-white/90 hover:bg-white flex items-center justify-center text-neutral-600">×</button>
          </div>
          <div class="p-6">
            <h2 class="text-lg font-medium" x-text="selected.title"></h2>
            <p class="text-xs text-neutral-500 mb-4" x-text="selected.description"></p>

            <div class="grid grid-cols-3 gap-2 mb-4">
              <div class="bg-neutral-50 rounded p-2 text-center">
                <div class="text-[10px] text-neutral-500 uppercase">prompts</div>
                <div class="text-base font-medium" x-text="selected.prompts_count"></div>
              </div>
              <div class="bg-neutral-50 rounded p-2 text-center">
                <div class="text-[10px] text-neutral-500 uppercase">params</div>
                <div class="text-base font-medium" x-text="Object.keys(selected.config_params || {}).length"></div>
              </div>
              <div class="bg-neutral-50 rounded p-2 text-center">
                <div class="text-[10px] text-neutral-500 uppercase">status</div>
                <div class="text-xs font-medium pt-1" x-text="selected.status"></div>
              </div>
            </div>

            <h3 class="text-xs uppercase text-neutral-400 tracking-wider mb-2">configuração</h3>
            <div class="space-y-1 mb-4">
              <template x-for="[k, v] in Object.entries(selected.config_params || {})" :key="k">
                <div class="flex items-center justify-between text-xs py-1.5 px-2 bg-neutral-50 rounded">
                  <span class="text-neutral-500" x-text="k"></span>
                  <span class="font-mono text-neutral-800" x-text="JSON.stringify(v)"></span>
                </div>
              </template>
            </div>

            <template x-if="selected.skill_obj">
              <div>
                <h3 class="text-xs uppercase text-neutral-400 tracking-wider mb-2">skill associada</h3>
                <a :href="`/skills?name=${selected.skill_obj.name}`" class="block bg-ai-50 hover:bg-ai-50/70 p-3 rounded text-xs">
                  <div class="font-medium text-ai-800" x-text="selected.skill_obj.title || selected.skill_obj.name"></div>
                  <div class="text-ai-600 mt-0.5">abrir editor →</div>
                </a>
              </div>
            </template>

            <div class="flex gap-2 mt-6 pt-4 border-t border-neutral-100">
              <a :href="`/prompts?module=${selected.name}`" class="text-xs px-3 py-1.5 border border-neutral-200 rounded hover:bg-neutral-50">prompts →</a>
              <a href="/modules" class="text-xs px-3 py-1.5 border border-neutral-200 rounded hover:bg-neutral-50">configurar →</a>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>

</div>

<script>
function blocksApp() {
  const data = {{ blocks | tojson | safe }};
  return {
    blocks: data,
    filter: '',
    statusFilter: '',
    selected: null,
    health: {},

    filtered() {
      const q = this.filter.toLowerCase();
      return this.blocks.filter(b => {
        if (this.statusFilter && b.status !== this.statusFilter) return false;
        if (!q) return true;
        return b.title.toLowerCase().includes(q) || b.description.toLowerCase().includes(q) || b.name.toLowerCase().includes(q);
      });
    },

    coverColor(name) {
      const palette = ['#DC2626', '#534AB7', '#185FA5', '#993C1D', '#993556', '#854F0B', '#3B6D11'];
      const seed = Array.from(name).reduce((a,c) => a + c.charCodeAt(0), 0);
      return palette[seed % palette.length];
    },

    coverStyle(name) {
      const c1 = this.coverColor(name);
      const seed = Array.from(name).reduce((a,c) => a + c.charCodeAt(0), 0);
      const palette = ['#DC2626', '#534AB7', '#185FA5', '#993C1D', '#993556', '#854F0B', '#3B6D11'];
      const c2 = palette[(seed + 3) % palette.length];
      return `background: linear-gradient(135deg, ${c1} 0%, ${c2} 100%)`;
    },

    openBlock(b) { this.selected = b; },

    async checkHealth(b) {
      try {
        const r = await window.api('GET', `/api/modules/${b.id}/health`);
        this.health[b.id] = r;
      } catch (e) {
        this.health[b.id] = { ok: false, error: e.message };
      }
    },
  };
}
</script>
{% endblock %}
